<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>jhle0-dev CMS</title>
    <link rel="stylesheet" href="/admin/admin.css?v=3" />
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        background: #f6f5f2;
        color: #111111;
        font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR",
          system-ui, sans-serif;
      }

      noscript {
        display: block;
        max-width: 720px;
        margin: 4rem auto;
        padding: 1rem 1.25rem;
        border: 1px solid #d7d2c8;
        border-radius: 16px;
        background: #fffdf8;
        line-height: 1.6;
      }
    </style>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script src="/admin/cms.js?v=4"></script>
  </head>
  <body>
    <div class="admin-chrome">
      <header class="admin-brandbar">
        <div>
          <p class="admin-kicker">jhle0-dev</p>
          <h1>Writing Studio</h1>
        </div>

        <nav class="admin-links" aria-label="CMS quick links">
          <a href="/" target="_blank" rel="noreferrer">Site</a>
          <a href="/blog" target="_blank" rel="noreferrer">Blog</a>
          <a href="/projects" target="_blank" rel="noreferrer">Projects</a>
        </nav>
      </header>

      <section class="admin-guide" aria-label="작성 가이드">
        <div class="admin-guide-grid">
          <article class="admin-note">
            <p class="admin-note-title">빠른 작성 흐름</p>
            <ol>
              <li>제목, 설명, 슬러그부터 먼저 입력</li>
              <li>태그는 자유롭게 추가</li>
              <li>본문은 markdown 원문 그대로 작성</li>
            </ol>
          </article>

          <article class="admin-note">
            <p class="admin-note-title">수식 / 노션 팁</p>
            <p>
              수식은 <code>$$ ... $$</code> 블록으로, 이미지는 업로드 후
              <code>/images/uploads</code> 경로를 그대로 쓰면 안정적입니다.
            </p>
          </article>

          <article class="admin-note">
            <p class="admin-note-title">권장 습관</p>
            <p>
              발행 전엔 <code>draft</code>로 저장하고, 확인 후 공개로 바꾸는
              흐름이 가장 안전합니다.
            </p>
          </article>
        </div>
      </section>
    </div>

    <noscript>
      Decap CMS를 사용하려면 JavaScript를 켜주세요.
    </noscript>
    <div id="nc-root"></div>
    <script>
      if (window.CMS) {
        window.CMS.registerPreviewStyle("/admin/preview.css");
        window.initializeJhle0Cms?.();
        window.CMS.init();
      }
    </script>
  </body>
</html>
