backend:
  name: github
  repo: jhle0/jhle0-dev
  branch: main
  auth_scope: repo
  use_graphql: true
  site_domain: jhle0-dev.vercel.app
  # 배포된 /admin 에서 GitHub 로그인까지 쓰려면
  # 아래 두 값을 외부 OAuth proxy 서비스에 맞게 채워주세요.
  base_url: https://jhle0-dev-cms-auth.dumiso04.workers.dev
  auth_endpoint: auth

local_backend:
  url: http://localhost:8081/api/v1
  allowed_hosts: ["127.0.0.1", "localhost"]

locale: ko
site_url: https://jhle0-dev.vercel.app
display_url: https://jhle0-dev.vercel.app
logo_url: /favicon.svg

media_folder: "public/images/uploads"
public_folder: "/images/uploads"
publish_mode: "simple"

collections:
  - name: "blog"
    label: "Blog"
    label_singular: "Post"
    folder: "src/content/blog"
    create: true
    delete: true
    extension: "md"
    format: "frontmatter"
    slug: "{{fields.slug}}"
    preview_path: "blog/{{slug}}"
    summary: "{{title}} · {{slug}}"
    sortable_fields: ["pubDate", "updatedDate", "title", "featured"]
    view_filters:
      - label: "Published"
        field: "draft"
        pattern: false
      - label: "Drafts"
        field: "draft"
        pattern: true
      - label: "Featured"
        field: "featured"
        pattern: true
    editor:
      preview: true
    fields:
      - label: "제목"
        name: "title"
        widget: "string"

      - label: "설명"
        name: "description"
        widget: "text"

      - label: "발행일"
        name: "pubDate"
        widget: "datetime"
        default: "{{now}}"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: false

      - label: "수정일"
        name: "updatedDate"
        widget: "datetime"
        required: false
        default: "{{now}}"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: false

      - label: "슬러그"
        name: "slug"
        widget: "string"
        hint: "URL에 들어갈 고유 값입니다. 예: my-first-post"
        pattern:
          - "^[a-z0-9]+(?:-[a-z0-9]+)*$"
          - "슬러그는 영문 소문자, 숫자, 하이픈만 사용할 수 있습니다."

      - label: "태그"
        name: "tags"
        widget: "list"
        default: ["log"]
        summary: "{{fields.tag}}"
        hint: "자유 입력입니다. 새 태그를 쓰면 그대로 태그 페이지가 생성됩니다."
        field:
          label: "태그"
          name: "tag"
          widget: "string"

      - label: "초안"
        name: "draft"
        widget: "boolean"
        default: false
        required: false

      - label: "대표 이미지"
        name: "heroImage"
        widget: "image"
        required: false
        hint: "업로드 이미지는 /images/uploads 로 저장됩니다."

      - label: "시리즈"
        name: "series"
        widget: "string"
        required: false
        hint: "같은 시리즈 글끼리 같은 이름을 사용하세요."

      - label: "추천 글"
        name: "featured"
        widget: "boolean"
        default: false
        required: false

      - label: "정본 URL"
        name: "canonicalURL"
        widget: "string"
        required: false
        pattern:
          - "^https?://.+$"
          - "정본 URL은 http:// 또는 https:// 로 시작해야 합니다."

      - label: "본문"
        name: "body"
        widget: "code"
        default_language: "markdown"
        allow_language_selection: false
        output_code_only: true
        hint: "수식과 LaTeX가 섞인 글은 원문 markdown 그대로 저장하는 방식이 가장 안정적입니다. $$...$$ 블록을 그대로 적으면 됩니다."
        default: |
          짧은 도입 문단으로 글의 맥락을 먼저 적습니다.

          ## 핵심 요약

          - 이 글에서 다루는 내용
          - 왜 중요한지
          - 읽고 나면 무엇을 얻는지

          ## 본문

          설명 문단을 이어서 적습니다.

          ## 마무리

          배운 점이나 다음 액션을 짧게 정리합니다.

  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "src/content/projects"
    create: true
    delete: true
    extension: "md"
    format: "frontmatter"
    slug: "{{fields.slug}}"
    preview_path: "projects/{{slug}}"
    summary: "{{title}} · {{slug}}"
    sortable_fields: ["pubDate", "updatedDate", "title", "status"]
    view_filters:
      - label: "Planned"
        field: "status"
        pattern: "planned"
      - label: "In Progress"
        field: "status"
        pattern: "in-progress"
      - label: "Completed"
        field: "status"
        pattern: "completed"
    editor:
      preview: true
    fields:
      - label: "제목"
        name: "title"
        widget: "string"

      - label: "설명"
        name: "description"
        widget: "text"

      - label: "발행일"
        name: "pubDate"
        widget: "datetime"
        default: "{{now}}"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: false

      - label: "수정일"
        name: "updatedDate"
        widget: "datetime"
        required: false
        default: "{{now}}"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: false

      - label: "슬러그"
        name: "slug"
        widget: "string"
        pattern:
          - "^[a-z0-9]+(?:-[a-z0-9]+)*$"
          - "슬러그는 영문 소문자, 숫자, 하이픈만 사용할 수 있습니다."

      - label: "태그"
        name: "tags"
        widget: "list"
        default: ["project"]
        summary: "{{fields.tag}}"
        hint: "프로젝트 성격과 기술 스택을 자유롭게 적습니다."
        field:
          label: "태그"
          name: "tag"
          widget: "string"

      - label: "초안"
        name: "draft"
        widget: "boolean"
        default: false
        required: false

      - label: "대표 이미지"
        name: "heroImage"
        widget: "image"
        required: false
        hint: "업로드 이미지는 /images/uploads 로 저장됩니다."

      - label: "상태"
        name: "status"
        widget: "select"
        required: false
        default: "planned"
        options:
          - { label: "Planned", value: "planned" }
          - { label: "In Progress", value: "in-progress" }
          - { label: "Completed", value: "completed" }

      - label: "GitHub URL"
        name: "githubUrl"
        widget: "string"
        required: false
        pattern:
          - "^https?://.+$"
          - "GitHub URL은 http:// 또는 https:// 로 시작해야 합니다."

      - label: "Demo URL"
        name: "demoUrl"
        widget: "string"
        required: false
        pattern:
          - "^https?://.+$"
          - "Demo URL은 http:// 또는 https:// 로 시작해야 합니다."

      - label: "본문"
        name: "body"
        widget: "code"
        default_language: "markdown"
        allow_language_selection: false
        output_code_only: true
        default: |
          프로젝트를 한 줄로 소개합니다.

          ## 개요

          - 무엇을 만든 프로젝트인지
          - 누구를 위한 프로젝트인지

          ## 내가 맡은 역할

          - 역할 1
          - 역할 2

          ## 핵심 구현

          구체적인 구현 포인트를 적습니다.

          ## 회고

          잘된 점과 아쉬운 점을 정리합니다.
